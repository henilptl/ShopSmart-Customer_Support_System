<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 700" width="1040" height="700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .lbl   { font-size: 15px;   font-weight: 700; fill: #0f172a; }
      .hlbl  { font-size: 13.5px; font-weight: 700; fill: #0f172a; }
      .sub   { font-size: 11.5px; fill: #475569; }
      .tiny  { font-size: 10.5px; fill: #64748b; }
      .edge  { stroke: #64748b; stroke-width: 1.8; fill: none; }
      .arrw  { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .term  { font-size: 13px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .badge { font-size: 10px; font-weight: 700; fill: #ffffff; letter-spacing: 0.4px; }
      .ctx   { font-size: 10px; font-weight: 700; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="700" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="40" y="46" class="title">ShopSmart Support Router — LangGraph Workflow</text>
  <text x="40" y="68" class="sub">StateGraph(AgentState) · LLM classification via structured output · conditional fan-out to specialist handlers</text>

  <!-- START -->
  <rect x="460" y="96" width="120" height="34" rx="17" fill="#0f172a"/>
  <text x="520" y="118" text-anchor="middle" class="term">START</text>

  <!-- state chip -->
  <rect x="650" y="93" width="340" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4 3"/>
  <text x="666" y="110" class="tiny" font-weight="700">AgentState (TypedDict) — shared across all nodes</text>
  <text x="666" y="126" class="tiny">customer_query · category · priority · response</text>

  <line x1="520" y1="130" x2="520" y2="162" class="arrw"/>

  <!-- classify_query -->
  <path d="M 340 164 h 360 a 10 10 0 0 1 10 10 v 12 h -380 v -12 a 10 10 0 0 1 10 -10 z" fill="#6366f1"/>
  <path d="M 330 186 h 380 v 48 a 10 10 0 0 1 -10 10 h -360 a 10 10 0 0 1 -10 -10 z" fill="#eef2ff"/>
  <rect x="330" y="164" width="380" height="80" rx="10" fill="none" stroke="#6366f1" stroke-width="1.8"/>
  <text x="342" y="180" class="badge">NODE · ENTRY POINT</text>
  <text x="352" y="210" class="lbl">classify_query</text>
  <text x="352" y="230" class="sub">LLM · with_structured_output(RouteDecision) → category + priority</text>

  <line x1="520" y1="244" x2="520" y2="276" class="arrw"/>

  <!-- conditional router -->
  <path d="M 520 278 L 770 312 L 520 346 L 270 312 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="520" y="309" text-anchor="middle" class="lbl">route_by_category</text>
  <text x="520" y="327" text-anchor="middle" class="sub">add_conditional_edges — returns next node name</text>

  <!-- fan-out -->
  <line x1="520" y1="346" x2="520" y2="372" class="edge"/>
  <line x1="130" y1="372" x2="910" y2="372" class="edge"/>
  <line x1="130" y1="372" x2="130" y2="404" class="arrw"/>
  <line x1="390" y1="372" x2="390" y2="404" class="arrw"/>
  <line x1="650" y1="372" x2="650" y2="404" class="arrw"/>
  <line x1="910" y1="372" x2="910" y2="404" class="arrw"/>
  <text x="138" y="392" class="tiny">"order_status"</text>
  <text x="398" y="392" class="tiny">"returns"</text>
  <text x="658" y="392" class="tiny">"billing"</text>
  <text x="918" y="392" class="tiny">"product_info"</text>

  <!-- handler: order_status -->
  <rect x="35" y="406" width="190" height="92" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="49" y="432" class="hlbl">handle_order_status</text>
  <text x="49" y="452" class="sub">Tracking, delays, delivery ETA</text>
  <rect x="49" y="462" width="162" height="22" rx="6" fill="#ffffff" stroke="#93c5fd"/>
  <text x="58" y="477" class="ctx">context: ORDERS_DB</text>

  <!-- handler: returns -->
  <rect x="295" y="406" width="190" height="92" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.8"/>
  <text x="309" y="432" class="hlbl">handle_returns</text>
  <text x="309" y="452" class="sub">Refunds, exchanges, damage</text>
  <rect x="309" y="462" width="162" height="22" rx="6" fill="#ffffff" stroke="#86efac"/>
  <text x="318" y="477" class="ctx">context: RETURN_POLICY</text>

  <!-- handler: billing -->
  <rect x="555" y="406" width="190" height="92" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
  <text x="569" y="432" class="hlbl">handle_billing</text>
  <text x="569" y="452" class="sub">Charges, failures, EMI, GST</text>
  <rect x="569" y="462" width="162" height="22" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="578" y="477" class="ctx">context: BILLING_POLICY</text>

  <!-- handler: product_info -->
  <rect x="815" y="406" width="190" height="92" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.8"/>
  <text x="829" y="432" class="hlbl">handle_product_info</text>
  <text x="829" y="452" class="sub">Specs, stock, recommendations</text>
  <rect x="829" y="462" width="162" height="22" rx="6" fill="#ffffff" stroke="#d8b4fe"/>
  <text x="838" y="477" class="ctx">context: PRODUCTS_DB</text>

  <!-- convergence bus -->
  <line x1="130" y1="498" x2="130" y2="545" class="edge"/>
  <line x1="390" y1="498" x2="390" y2="545" class="edge"/>
  <line x1="650" y1="498" x2="650" y2="545" class="edge"/>
  <line x1="910" y1="498" x2="910" y2="545" class="edge"/>
  <line x1="130" y1="545" x2="910" y2="545" class="edge"/>
  <line x1="520" y1="545" x2="520" y2="562" class="arrw"/>
  <text x="1000" y="538" text-anchor="end" class="tiny" font-style="italic">every handler writes state["response"], then terminates</text>

  <!-- END -->
  <rect x="460" y="564" width="120" height="34" rx="17" fill="#0f172a"/>
  <text x="520" y="586" text-anchor="middle" class="term">END</text>

  <line x1="520" y1="598" x2="520" y2="624" class="arrw"/>

  <!-- final state -->
  <rect x="360" y="626" width="320" height="48" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="376" y="645" class="tiny" font-weight="700">FINAL STATE → caller</text>
  <text x="376" y="662" class="tiny">category · priority · response</text>

  <!-- legend -->
  <rect x="35" y="628" width="14" height="10" rx="2" fill="#eef2ff" stroke="#6366f1"/>
  <text x="56" y="637" class="tiny">LLM node</text>
  <rect x="35" y="648" width="14" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="56" y="657" class="tiny">Conditional edge (routing function)</text>
  <rect x="35" y="668" width="14" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="56" y="677" class="tiny">Specialist handler node</text>

  <text x="1000" y="677" text-anchor="end" class="tiny">Exactly one handler executes per query</text>
</svg>
